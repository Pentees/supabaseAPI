name: RunAPI

env: 
  URL:  ${{secrets.SUPABSE_URL}}
  KEY:  ${{secrets.SUPABSE_KEY}}
  
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Python
        uses: actions/setup-python@v6
        with: 
          python-version: '3.14'
          architecture: 'x64'
      - name: Install Node.js
        uses: snok/install-poetry@v1
        with:
          node-version: '20'
          cache: 'npm'
      - name: Write down all Dependencies
        run: pip freeze > requirements.txt
      - name: Install Depencies about Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt
      - name: Set up Top Page
        run: |
          mkdir data
          echo "<h1>Hello GitHub Pages!</h1>" > data/index.html
      - name: Build
        run: python main.py
      
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
